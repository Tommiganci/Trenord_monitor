name: Trenord Monitor

on:
  schedule:
    - cron: '13 4-22 * * *' # Ogni ora dalle 04:00 alle 22:00 UTC (06:00-00:00 ora italiana)
  workflow_dispatch: # Permette esecuzione manuale

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Rome  # fuso orario
    
    permissions:
      contents: write # Necessario per fare commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive Old Data
        run: python archive.py

      - name: Run Monitor (Raccolta Dati)
        run: python monitor.py

      - name: Generate HTML Bollettino
        run: python bollettino.py --export-html

      - name: Telegram Alerts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python telegram_bot.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update data and dashboard"
            git push
          else
            echo "Nessuna modifica da salvare"
          fi
