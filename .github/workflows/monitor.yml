name: Trenord Monitor

on:
  schedule:
    - cron: '13 4-22 * * *' # Ogni ora dalle 04:00 alle 22:00 UTC (06:00-00:00 ora italiana)
  workflow_dispatch: # Permette esecuzione manuale

concurrency:
  group: trenord-monitor
  cancel-in-progress: false # Non cancellare run in corso, aspetta

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Rome  # fuso orario
    
    permissions:
      contents: write # Necessario per fare commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive Old Data
        run: python archive.py

      - name: Run Monitor (Raccolta Dati)
        run: python monitor.py

      - name: Generate HTML Bollettino
        run: python bollettino.py --export-html


      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update data and dashboard [$(date '+%Y-%m-%d %H:%M')]"
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "Nessuna modifica da salvare"
          fi
